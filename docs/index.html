<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K8S Exam Dashboard</title>
  <meta name="description" content="CKA/CKAD/CKS responsive study dashboard" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header class="topbar">
    <button id="menuBtn" class="menu-btn" aria-label="Toggle menu">Menu</button>
    <div>
      <h1>K8S Exam Dashboard</h1>
      <p>Study flow + live markdown viewer</p>
    </div>
  </header>

  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <section class="panel">
        <h2>Study Steps</h2>
        <ol id="stepsList" class="steps"></ol>
      </section>
      <section class="panel">
        <h2>Content Map</h2>
        <div id="contentMap" class="content-map"></div>
      </section>
    </aside>

    <main class="content">
      <section class="hero">
        <h2 id="docTitle">Select a document</h2>
        <p id="docPath">Choose any file from the content map.</p>
      </section>
      <article id="viewer" class="viewer"></article>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
